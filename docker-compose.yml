version: '3.8'
services:
  # 1) Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.6.2
    container_name: es_local
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      # Optional: disable xpack security for a simpler local dev experience:
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - bevel_esdata:/usr/share/elasticsearch/data
    networks:
      - backend_network

  # 2) Kibana
  kibana:
    image: docker.elastic.co/kibana/kibana:8.6.2
    container_name: kibana_local
    depends_on:
      - elasticsearch
    environment:
      # Make sure kibana talks to the 'elasticsearch' service by container name
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - backend_network

  # 3) Postgres
  postgres:
    image: postgres:latest
    container_name: postgres_local
    user: postgres
    environment:
      POSTGRES_DB: bevel
      POSTGRES_USER: bevel
      POSTGRES_PASSWORD: password
    ports:
      - "54328:5432"
    volumes:
      - bevel_pgdata:/var/lib/postgresql/data
    networks:
      - backend_network

volumes:
  bevel_esdata:
  bevel_pgdata:

networks:
  backend_network:
    driver: bridge
